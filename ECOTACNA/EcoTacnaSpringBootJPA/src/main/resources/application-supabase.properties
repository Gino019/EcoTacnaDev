# ============================================================
# ECO_TACNA - Supabase PostgreSQL Profile
# ============================================================

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://aws-1-us-east-1.pooler.supabase.com:6543/postgres?sslmode=require&prepareThreshold=0}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres.fhdnwwqiraybpakspegx}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:EcoTacna123}

spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# SQL init must stay disabled. No schema.sql/data.sql/import.sql.
spring.sql.init.mode=never

# HikariCP - keep pool small for Supabase pooler
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=0
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000

# Server
server.port=${PORT:8082}
server.servlet.context-path=/ecotacna

# Desactivado temporalmente para pruebas locales con perfil supabase.
# Activación real del PuzzleCaptcha se revisará en Bloque 2C.
captcha.enabled=${CAPTCHA_ENABLED:true}

