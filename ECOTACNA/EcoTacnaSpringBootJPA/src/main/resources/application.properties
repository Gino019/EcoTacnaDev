# Nombre de la aplicación
spring.application.name=ECOTACNA

# Configuración de Servidor
server.port=${PORT:8080}
server.servlet.context-path=/ecotacna

# Configuración de Seguridad y JWT
# Secreto HMAC-256 codificado (Mínimo 256 bits para HS256)
jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
# Expiración del token en milisegundos (24 horas = 86400000 ms)
jwt.expiration=${JWT_EXPIRATION:86400000}

# Habilitar bootstrap inicial desde environment var (por defecto falso)
ecotacna.bootstrap.enabled=true

# Captcha de Rompecabezas (PuzzleCaptcha)
captcha.enabled=${CAPTCHA_ENABLED:true}

# Payments Configuration
payments.enabled=${PAYMENTS_ENABLED:true}
payments.mode=${PAYMENTS_MODE:simulated}

# ApiPeruDev / RUC lookup configuration
ruc.provider=${RUC_PROVIDER:apiperudev}
apiperudev.api.token=e08c12d6357d3a5b162531f78d326f698b53886e568e740b96f1e8e33ccda0a2
apiperudev.api.base-url=${APIPERUDEV_API_BASE_URL:https://apiperu.dev/api}
